<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruit Slice Cutter</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#222;
    font-family:Arial;
    color:white;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    font-size:28px;
    z-index:100;
}

canvas{
    display:block;
}
</style>
</head>
<body>

<div id="score">Score: 0</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let candies = [];
let trail = [];

class Candy{
    constructor(){
        this.x = Math.random()*canvas.width;
        this.y = canvas.height+50;
        this.radius = 25;

        this.vx = (Math.random()-0.5)*6;
        this.vy = -(12+Math.random()*6);

        this.color =
        ["red","yellow","lime","cyan","orange","pink"]
        [Math.floor(Math.random()*6)];

        this.cut = false;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.25;
    }

    draw(){
        ctx.beginPath();
        ctx.fillStyle=this.color;
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fill();
    }
}

function spawnCandy(){
    candies.push(new Candy());
}

setInterval(spawnCandy,700
