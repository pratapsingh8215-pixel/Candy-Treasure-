<!DOCTYPE html>
<html>
<head>
<title>Candy Treasure</title>
<style>
body{
  text-align:center;
  font-family:Arial;
  background:#fff3e0;
}
#game{
  width:300px;
  height:400px;
  margin:auto;
  border:2px solid #333;
  position:relative;
  background:white;
}
.candy{
  position:absolute;
  font-size:35px;
  cursor:pointer;
}
</style>
</head>
<body>

<h1>🍬 Candy Treasure 🍬</h1>
<h2>Score: <span id="score">0</span></h2>

<div id="game"></div>

<script>
let score=0;
const game=document.getElementById("game");

function createCandy(){
  let candy=document.createElement("div");
  candy.className="candy";
  candy.innerHTML="🍬";

  candy.style.left=Math.random()*250+"px";
  candy.style.top=Math.random()*350+"px";

  candy.onclick=function(){
    score++;
    document.getElementById("score").innerText=score;
    candy.remove();
    createCandy();
  };

  game.appendChild(candy);
}

createCandy();
</script>

</body>
</html>
